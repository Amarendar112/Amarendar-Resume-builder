<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 30 310 100" width="310" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="dotGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="dotGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4F46E5" flood-opacity="0.2"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <!-- Icon: Network/nodes forming abstract S shape representing Skills -->
    <g transform="translate(55, 80)">
      <!-- Connection lines forming network -->
      <line x1="-30" y1="-32" x2="-5" y2="-18" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="-5" y1="-18" x2="22" y2="-28" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="22" y1="-28" x2="32" y2="-5" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="32" y1="-5" x2="15" y2="15" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="15" y1="15" x2="-12" y2="22" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <line x1="-12" y1="22" x2="-30" y2="8" stroke="url(#iconGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
      <!-- Cross connections -->
      <line x1="-30" y1="-32" x2="22" y2="-28" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="-5" y1="-18" x2="15" y2="15" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="22" y1="-28" x2="-12" y2="22" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
      <line x1="-30" y1="-32" x2="-30" y2="8" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
      <line x1="32" y1="-5" x2="-12" y2="22" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
      <!-- Nodes -->
      <circle cx="-30" cy="-32" r="7" fill="url(#iconGrad)" filter="url(#glow)"/>
      <circle cx="-5" cy="-18" r="5.5" fill="url(#dotGrad1)"/>
      <circle cx="22" cy="-28" r="8" fill="url(#iconGrad)" filter="url(#glow)"/>
      <circle cx="32" cy="-5" r="5" fill="url(#dotGrad2)"/>
      <circle cx="15" cy="15" r="6" fill="url(#dotGrad1)"/>
      <circle cx="-12" cy="22" r="7.5" fill="url(#iconGrad)" filter="url(#glow)"/>
      <circle cx="-30" cy="8" r="4.5" fill="url(#dotGrad2)"/>
      <!-- Small highlight dots on main nodes -->
      <circle cx="-28" cy="-34" r="2" fill="white" opacity="0.6"/>
      <circle cx="24" cy="-30" r="2.2" fill="white" opacity="0.6"/>
      <circle cx="-10" cy="20" r="2" fill="white" opacity="0.6"/>
    </g>
  </g>
  <!-- Text: "skillsiniq" -->
  <g>
    <text x="120" y="90" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="-1.5">
      <tspan fill="url(#textGrad)">skills</tspan><tspan fill="#7C3AED">iniq</tspan>
    </text>
    <!-- Subtle tagline -->
    <text x="122" y="115" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#94A3B8" letter-spacing="3.5">SKILL INTELLIGENCE</text>
  </g>
  <!-- Decorative accent line -->
  <line x1="122" y1="122" x2="195" y2="122" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>